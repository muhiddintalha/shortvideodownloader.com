services:

  app:
    build: .
    restart: unless-stopped
    networks:
      - internal
    # NOT exposed to the public internet — only Caddy reaches it
    volumes:
      - svd_tmp:/tmp/svd-downloads
    environment:
      TMPDIR: /tmp/svd-downloads
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 / QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app

volumes:
  svd_tmp:      # isolated temp download space
  caddy_data:   # Let's Encrypt certs — persists across restarts
  caddy_config: # Caddy runtime config

networks:
  internal:
    driver: bridge
